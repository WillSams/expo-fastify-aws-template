name: Application Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test-api:
    name: API Unit Tests
    runs-on: ubuntu-latest
    env:
      ABOUT_MESSAGE: "Template API v0.0.1 (ci)"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install api dependencies
        working-directory: apps/api
        run: npm ci

      - name: Lint
        working-directory: apps/api
        run: npm run lint

      - name: Test with coverage
        working-directory: apps/api
        run: npm run test:coverage

  unit-test-mobile:
    name: Mobile Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      # Fails the build if any dependency has drifted from the versions the
      # Expo SDK expects — catches SDK-parity breakage (e.g. a react or
      # tailwindcss bump) that unit tests would not surface until a native build.
      - name: Check Expo SDK dependency parity
        working-directory: apps/mobile
        run: npx expo install --check

      - name: Lint
        working-directory: apps/mobile
        run: npm run lint

      - name: Test with coverage
        working-directory: apps/mobile
        run: npm run test:coverage