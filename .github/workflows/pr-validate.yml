name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'apps/api/') ||
      contains(github.event.pull_request.changed_files, 'packages/')
    env:
      ABOUT_MESSAGE: "Template API v0.0.1 (ci)"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Lint
        working-directory: apps/api
        run: npm run lint

      - name: Test with coverage
        working-directory: apps/api
        run: npm run test:coverage

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'apps/mobile/') ||
      contains(github.event.pull_request.changed_files, 'packages/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Lint
        working-directory: apps/mobile
        run: npm run lint

      - name: Test with coverage
        working-directory: apps/mobile
        run: npm run test:coverage